services:
  - type: web
    name: lead-hunter
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --timeout 120 app:app
    autoDeploy: true
    envVars:
      - key: OVERPASS_QUERY_TIMEOUT
        value: "10"
      - key: OVERPASS_REQUEST_TIMEOUT
        value: "12"
      - key: CITY_RESULT_LIMIT
        value: "20"
      - key: SEARCH_TARGET_LEADS
        value: "10"
